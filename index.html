<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Төрсөн өдрийн мэнд</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background: radial-gradient(ellipse at 55% 45%, #fce4f7 0%, #f3c8ef 35%, #ddb8ee 65%, #c9a8e8 100%);
}
.scene{
  width:100%;max-width:560px;
  height:100vh;max-height:700px;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:center;
  padding-top:200px;
  position:relative;overflow:hidden;
}
.cfl{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20}
.stage{position:relative;width:220px;height:260px;cursor:pointer;z-index:5}
.burst-zone{position:absolute;top:0;left:50%;transform:translateX(-50%);width:460px;pointer-events:none;z-index:6}
.fl{position:absolute;opacity:0;transform:scale(0.05);transition:none}
.text-float{
  position:absolute;top:0;left:50%;
  transform:translateX(-50%) translateY(0) scale(0.4);
  opacity:0;white-space:nowrap;z-index:7;text-align:center;pointer-events:none;transition:none;
}
.text-float .title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:#42a5f5;letter-spacing:1px;line-height:1.2;text-shadow:0 2px 14px rgba(66,165,245,0.3)}
.text-float .sub{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:#1565c0;letter-spacing:2.5px;margin-top:5px}

/* ── SECOND BOX (small, appears after first open) ── */
.mini-stage{
  position:absolute;
  bottom:-120px;
  left:50%;transform:translateX(-50%);
  width:110px;height:130px;
  cursor:pointer;z-index:8;
  opacity:0;
  transition:bottom 0.8s cubic-bezier(0.34,1.4,0.64,1), opacity 0.4s ease;
}
.mini-stage.show{bottom:20px;opacity:1}
.mini-stage.idle2{animation:wiggle2 1.8s ease-in-out infinite}
@keyframes wiggle2{
  0%,85%,100%{transform:translateX(-50%) rotate(0deg)}
  88%{transform:translateX(-50%) rotate(-3deg)}
  91%{transform:translateX(-50%) rotate(3deg)}
  94%{transform:translateX(-50%) rotate(-2.5deg)}
  97%{transform:translateX(-50%) rotate(2deg)}
}

/* mini box parts */
.mini-lid-wrap{position:absolute;top:0;left:-8px;width:126px;z-index:10;transform-origin:50% 0%;transition:none}
.mini-lid-top{width:126px;height:11px;background:#1565c0;border-radius:4px 4px 0 0;position:relative}
.mini-lid-side{width:116px;height:19px;margin:0 auto;background:#0d47a1;border-radius:0 0 3px 3px}
.mini-lid-ribbon{position:absolute;top:50%;left:0;width:100%;height:6px;background:#0a3880;transform:translateY(-50%);z-index:1}
.mini-bow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}
.mini-body-wrap{position:absolute;top:30px;left:0;width:110px;height:100px;z-index:2}
.mini-body-front{width:110px;height:100px;background:#1976d2;border-radius:2px 2px 7px 7px;position:relative;overflow:hidden}
.mini-body-front::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,0.08)}
.mini-rv{position:absolute;left:50%;top:0;width:7px;height:100%;background:#0d47a1;transform:translateX(-50%);z-index:1}
.mini-rh{position:absolute;top:35%;left:0;width:100%;height:7px;background:#0d47a1;z-index:1}
.mini-shine{position:absolute;top:8px;left:10px;width:12px;height:38px;background:rgba(255,255,255,0.13);border-radius:3px;transform:rotate(-14deg);z-index:2}
.mini-engrave{font-family:'Playfair Display',serif;font-size:7px;font-style:italic;color:rgba(255,255,255,0.38);text-align:center;position:absolute;bottom:10px;left:0;right:0;letter-spacing:0.3px;line-height:1.6;z-index:3}
.mini-base{width:105px;height:6px;margin:0 auto;background:#0a3880;border-radius:0 0 7px 7px}

/* second box reveal: congrats card + photo */
.card-reveal{
  position:absolute;
  bottom:-400px;left:50%;transform:translateX(-50%);
  width:280px;
  background:rgba(255,255,255,0.92);
  border-radius:16px;
  padding:20px 18px 22px;
  text-align:center;
  z-index:9;
  opacity:0;
  transition:bottom 0.9s cubic-bezier(0.34,1.3,0.64,1), opacity 0.5s ease;
  box-shadow:0 8px 32px rgba(120,40,180,0.18);
}
.card-reveal.show{bottom:170px;opacity:1}
.card-reveal .ctitle{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#0d47a1;letter-spacing:0.5px;margin-bottom:6px}
.card-reveal .csub{font-family:'Playfair Display',serif;font-size:12px;font-style:italic;color:#1565c0;letter-spacing:1.5px;margin-bottom:14px}
.card-reveal img{width:100%;border-radius:10px;object-fit:cover;max-height:200px}

/* ── THIRD BOX (tiny, appears after second card shown) ── */
.tiny-stage{
  position:absolute;
  bottom:-120px;
  left:50%;transform:translateX(-50%);
  width:80px;height:96px;
  cursor:pointer;z-index:11;
  opacity:0;
  transition:bottom 0.8s cubic-bezier(0.34,1.4,0.64,1), opacity 0.4s ease;
}
.tiny-stage.show{bottom:20px;opacity:1}
.tiny-stage.idle3{animation:wiggle3 1.6s ease-in-out infinite}
@keyframes wiggle3{
  0%,82%,100%{transform:translateX(-50%) rotate(0deg)}
  85%{transform:translateX(-50%) rotate(-4deg)}
  88%{transform:translateX(-50%) rotate(4deg)}
  91%{transform:translateX(-50%) rotate(-3deg)}
  94%{transform:translateX(-50%) rotate(3deg)}
  97%{transform:translateX(-50%) rotate(-2deg)}
}
.tiny-lid-wrap{position:absolute;top:0;left:-6px;width:92px;z-index:10;transform-origin:50% 0%;transition:none}
.tiny-lid-top{width:92px;height:8px;background:#1565c0;border-radius:4px 4px 0 0;position:relative}
.tiny-lid-side{width:84px;height:14px;margin:0 auto;background:#0d47a1;border-radius:0 0 3px 3px}
.tiny-lid-ribbon{position:absolute;top:50%;left:0;width:100%;height:5px;background:#0a3880;transform:translateY(-50%);z-index:1}
.tiny-bow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}
.tiny-body-wrap{position:absolute;top:22px;left:0;width:80px;height:74px;z-index:2}
.tiny-body-front{width:80px;height:74px;background:#1976d2;border-radius:2px 2px 6px 6px;position:relative;overflow:hidden}
.tiny-body-front::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,0.08)}
.tiny-rv{position:absolute;left:50%;top:0;width:5px;height:100%;background:#0d47a1;transform:translateX(-50%);z-index:1}
.tiny-rh{position:absolute;top:35%;left:0;width:100%;height:5px;background:#0d47a1;z-index:1}
.tiny-shine{position:absolute;top:6px;left:8px;width:8px;height:28px;background:rgba(255,255,255,0.13);border-radius:3px;transform:rotate(-14deg);z-index:2}
.tiny-engrave{font-family:'Playfair Display',serif;font-size:6px;font-style:italic;color:rgba(255,255,255,0.38);text-align:center;position:absolute;bottom:8px;left:0;right:0;letter-spacing:0.2px;line-height:1.5;z-index:3}
.tiny-base{width:76px;height:5px;margin:0 auto;background:#0a3880;border-radius:0 0 6px 6px}

.card-reveal2{
  position:absolute;
  bottom:-400px;left:50%;transform:translateX(-50%);
  width:280px;
  background:rgba(255,255,255,0.92);
  border-radius:16px;
  padding:20px 18px 22px;
  text-align:center;
  z-index:12;
  opacity:0;
  transition:bottom 0.9s cubic-bezier(0.34,1.3,0.64,1), opacity 0.5s ease;
  box-shadow:0 8px 32px rgba(120,40,180,0.18);
}
.card-reveal2.show{bottom:170px;opacity:1}
.card-reveal2 .ctitle{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#0d47a1;letter-spacing:0.5px;margin-bottom:6px}
.card-reveal2 .csub{font-family:'Playfair Display',serif;font-size:12px;font-style:italic;color:#1565c0;letter-spacing:1.5px;margin-bottom:14px}
.card-reveal2 img{width:100%;border-radius:10px;object-fit:cover;max-height:200px}

/* ── FIRST BOX ── */
.box{position:relative;width:220px;height:260px}
.lid-wrap{position:absolute;top:0;left:-16px;width:252px;z-index:10;transform-origin:50% 0%;transition:none}
.lid-top{width:252px;height:22px;background:#c2185b;border-radius:6px 6px 0 0;position:relative}
.lid-top::before{content:'';position:absolute;inset:0;border-radius:6px 6px 0 0;background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,transparent 100%)}
.lid-side{width:232px;height:38px;margin:0 auto;background:#ad1457;border-radius:0 0 4px 4px;position:relative}
.lid-side::after{content:'';position:absolute;left:10px;top:6px;width:20px;height:22px;background:rgba(255,255,255,0.1);border-radius:3px;transform:rotate(-12deg)}
.lid-ribbon{position:absolute;top:50%;left:0;width:100%;height:13px;background:#880e4f;transform:translateY(-50%);z-index:1}
.bow-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}
.body-wrap{position:absolute;top:60px;left:0;width:220px;height:200px;z-index:2}
.body-front{width:220px;height:200px;background:#e91e8c;border-radius:3px 3px 10px 10px;position:relative;overflow:hidden}
.body-front::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,0.07)}
.body-ribbon-v{position:absolute;left:50%;top:0;width:13px;height:100%;background:#880e4f;transform:translateX(-50%);z-index:1}
.body-ribbon-h{position:absolute;top:35%;left:0;width:100%;height:13px;background:#880e4f;z-index:1}
.body-shine{position:absolute;top:12px;left:16px;width:22px;height:68px;background:rgba(255,255,255,0.13);border-radius:4px;transform:rotate(-14deg);z-index:2}
.body-front::after{content:'';position:absolute;bottom:0;left:0;right:0;height:16px;background:rgba(0,0,0,0.08);border-radius:0 0 10px 10px}
.engrave{font-family:'Playfair Display',serif;font-size:11px;font-style:italic;color:rgba(255,255,255,0.38);text-align:center;position:absolute;bottom:18px;left:0;right:0;letter-spacing:0.5px;line-height:1.7;z-index:3}
.body-base{width:210px;height:10px;margin:0 auto;background:#b5124e;border-radius:0 0 10px 10px}

@keyframes wiggle{
  0%,85%,100%{transform:rotate(0deg)}
  88%{transform:rotate(-3deg)}
  91%{transform:rotate(3deg)}
  94%{transform:rotate(-2.5deg)}
  97%{transform:rotate(2deg)}
}
.stage.idle{animation:wiggle 2.4s ease-in-out infinite}
.cdot{position:absolute;animation:cffall linear forwards}
@keyframes cffall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(700px) rotate(720deg)}}
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="cfl" id="cfl"></div>

  <div class="stage idle" id="stage" onclick="openBox()">
    <div class="burst-zone" id="burstZone" style="top:60px">
      <div class="fl" id="fl0" style="left:190px;top:80px"><svg width="54" height="65" viewBox="0 0 54 65"><ellipse cx="27" cy="14" rx="10" ry="14" fill="#f06292"/><ellipse cx="13" cy="27" rx="10" ry="14" fill="#e91e8c" transform="rotate(-60 13 27)"/><ellipse cx="41" cy="27" rx="10" ry="14" fill="#f48fb1" transform="rotate(60 41 27)"/><circle cx="27" cy="27" r="9" fill="#ffd54f"/><circle cx="27" cy="27" r="5" fill="#ffb300"/><line x1="27" y1="36" x2="27" y2="63" stroke="#66bb6a" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <div class="fl" id="fl1" style="left:80px;top:80px"><svg width="48" height="58" viewBox="0 0 48 58"><ellipse cx="24" cy="11" rx="8" ry="11" fill="#ce93d8"/><ellipse cx="36" cy="21" rx="8" ry="11" fill="#ab47bc" transform="rotate(72 36 21)"/><ellipse cx="33" cy="35" rx="8" ry="11" fill="#9c27b0" transform="rotate(144 33 35)"/><ellipse cx="15" cy="35" rx="8" ry="11" fill="#ce93d8" transform="rotate(216 15 35)"/><ellipse cx="12" cy="21" rx="8" ry="11" fill="#e1bee7" transform="rotate(288 12 21)"/><circle cx="24" cy="24" r="7" fill="#fff9c4"/><circle cx="24" cy="24" r="4" fill="#ffee58"/><line x1="24" y1="31" x2="24" y2="56" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <div class="fl" id="fl2" style="left:260px;top:80px"><svg width="48" height="58" viewBox="0 0 48 58"><ellipse cx="24" cy="12" rx="9" ry="13" fill="#ffcc80"/><ellipse cx="11" cy="24" rx="9" ry="13" fill="#ffa726" transform="rotate(-60 11 24)"/><ellipse cx="37" cy="24" rx="9" ry="13" fill="#ffb74d" transform="rotate(60 37 24)"/><circle cx="24" cy="24" r="8" fill="#ef5350"/><circle cx="24" cy="24" r="4" fill="#ffcdd2"/><line x1="24" y1="32" x2="24" y2="56" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <div class="fl" id="fl3" style="left:330px;top:80px"><svg width="44" height="54" viewBox="0 0 44 54"><ellipse cx="22" cy="10" rx="7" ry="10" fill="#f8bbd0"/><ellipse cx="33" cy="19" rx="7" ry="10" fill="#f06292" transform="rotate(72 33 19)"/><ellipse cx="29" cy="31" rx="7" ry="10" fill="#e91e8c" transform="rotate(144 29 31)"/><ellipse cx="15" cy="31" rx="7" ry="10" fill="#f48fb1" transform="rotate(216 15 31)"/><ellipse cx="11" cy="19" rx="7" ry="10" fill="#fce4ec" transform="rotate(288 11 19)"/><circle cx="22" cy="21" r="6" fill="#fff3e0"/><circle cx="22" cy="21" r="3" fill="#ffcc02"/><line x1="22" y1="27" x2="22" y2="52" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <div class="fl" id="fl4" style="left:20px;top:80px"><svg width="40" height="50" viewBox="0 0 40 50"><ellipse cx="20" cy="9" rx="7" ry="9" fill="#80cbc4"/><ellipse cx="30" cy="18" rx="7" ry="9" fill="#26a69a" transform="rotate(72 30 18)"/><ellipse cx="26" cy="30" rx="7" ry="9" fill="#00897b" transform="rotate(144 26 30)"/><ellipse cx="14" cy="30" rx="7" ry="9" fill="#80cbc4" transform="rotate(216 14 30)"/><ellipse cx="10" cy="18" rx="7" ry="9" fill="#b2dfdb" transform="rotate(288 10 18)"/><circle cx="20" cy="20" r="6" fill="#fff9c4"/><circle cx="20" cy="20" r="3" fill="#f9a825"/><line x1="20" y1="26" x2="20" y2="48" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/></svg></div>
      <div class="fl" id="fl5" style="left:150px;top:80px"><svg width="40" height="50" viewBox="0 0 40 50"><ellipse cx="20" cy="9" rx="6" ry="9" fill="#b39ddb"/><ellipse cx="30" cy="18" rx="6" ry="9" fill="#7e57c2" transform="rotate(-60 30 18)"/><ellipse cx="10" cy="18" rx="6" ry="9" fill="#9575cd" transform="rotate(60 10 18)"/><circle cx="20" cy="20" r="6" fill="#fff8e1"/><circle cx="20" cy="20" r="3" fill="#ffd740"/><line x1="20" y1="26" x2="20" y2="48" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/></svg></div>
      <div class="text-float" id="textFloat" style="top:60px">
        <div class="title">Төрсөн өдрийн мэнд✦</div>
        
      </div>
    </div>

    <div class="box">
      <div class="lid-wrap" id="lid">
        <div class="lid-top">
          <div class="lid-ribbon"></div>
          <div class="bow-wrap">
            <svg width="58" height="34" viewBox="0 0 58 34" fill="none">
              <path d="M29 17 Q10 1 3 8 Q-1 14 11 17 Q-1 20 3 26 Q10 33 29 17Z" fill="#880e4f"/>
              <path d="M29 17 Q48 1 55 8 Q59 14 47 17 Q59 20 55 26 Q48 33 29 17Z" fill="#880e4f"/>
              <path d="M29 17 Q10 1 3 8 Q-1 14 11 17 Q-1 20 3 26 Q10 33 29 17Z" fill="#ad1457" opacity="0.6"/>
              <path d="M29 17 Q48 1 55 8 Q59 14 47 17 Q59 20 55 26 Q48 33 29 17Z" fill="#ad1457" opacity="0.6"/>
              <ellipse cx="29" cy="17" rx="5" ry="5" fill="#880e4f"/>
              <ellipse cx="29" cy="17" rx="3" ry="3" fill="#c2185b"/>
            </svg>
          </div>
        </div>
        <div class="lid-side"></div>
      </div>
      <div class="body-wrap">
        <div class="body-front">
          <div class="body-ribbon-v"></div>
          <div class="body-ribbon-h"></div>
          <div class="body-shine"></div>
          <div class="engrave">Төрсөн өдрийн<br>мэнд хүргэе</div>
        </div>
        <div class="body-base"></div>
      </div>
    </div>
  </div>

  <!-- MINI BLUE BOX -->
  <div class="mini-stage" id="miniStage" onclick="openMiniBox()">
    <div class="mini-lid-wrap" id="miniLid">
      <div class="mini-lid-top">
        <div class="mini-lid-ribbon"></div>
        <div class="mini-bow">
          <svg width="30" height="18" viewBox="0 0 30 18" fill="none">
            <path d="M15 9 Q5 1 2 4 Q0 7 6 9 Q0 11 2 14 Q5 17 15 9Z" fill="#0a3880"/>
            <path d="M15 9 Q25 1 28 4 Q30 7 24 9 Q30 11 28 14 Q25 17 15 9Z" fill="#0a3880"/>

      <div class="mini-lid-side"></div>
    </div>
    <div class="mini-body-wrap">
      <div class="mini-body-front">
        <div class="mini-rv"></div>
        <div class="mini-rh"></div>
        <div class="mini-shine"></div>
        <div class="mini-engrave">Сайхан<br>баярлаарай</div>

      <div class="mini-base"></div>

  <!-- CARD with photo -->

<script>
var opened=false, miniOpened=false, tinyOpened=false;
var targets=[
  {l:190,t:-210},{l:50,t:-230},{l:310,t:-200},
  {l:370,t:-130},{l:-10,t:-150},{l:210,t:-270}
];

function openBox(){
  if(opened)return;
  opened=true;
  var stage=document.getElementById('stage');
  stage.classList.remove('idle');
  stage.style.animation='none';
  stage.style.cursor='default';
  var lid=document.getElementById('lid');
  lid.style.transition='transform 0.75s cubic-bezier(0.34,1.4,0.64,1)';
  lid.style.transform='perspective(500px) rotateX(-148deg)';
  var delays=[100,200,160,290,240,330];
  for(var i=0;i<6;i++){
    (function(idx,dl){
      setTimeout(function(){
        var el=document.getElementById('fl'+idx);
        el.style.transition='left 0.7s cubic-bezier(0.15,0.85,0.35,1.25),top 0.75s cubic-bezier(0.15,1.5,0.35,1.1),opacity 0.25s ease,transform 0.7s cubic-bezier(0.15,0.85,0.35,1.25)';
        el.style.left=targets[idx].l+'px'; el.style.top=targets[idx].t+'px';
        el.style.opacity='1'; el.style.transform='scale(1)';
      },280+dl);
    })(i,delays[i]);
  }
  setTimeout(function(){
    var tf=document.getElementById('textFloat');
    tf.style.transition='opacity 0.65s ease,transform 0.9s cubic-bezier(0.18,1.5,0.32,1)';
    tf.style.opacity='1';
    tf.style.transform='translateX(-50%) translateY(-320px) scale(1)';
    burst();
  },550);
  // show mini box after delay
  setTimeout(function(){
    var ms=document.getElementById('miniStage');
    ms.classList.add('show');
    setTimeout(function(){ ms.classList.add('idle2'); },900);
  },1400);
}

function openMiniBox(){
  if(miniOpened)return;
  miniOpened=true;
  var ms=document.getElementById('miniStage');
  ms.classList.remove('idle2');
  ms.style.animation='none';
  ms.style.cursor='default';
  var ml=document.getElementById('miniLid');
  ml.style.transition='transform 0.7s cubic-bezier(0.34,1.4,0.64,1)';
  ml.style.transform='perspective(300px) rotateX(-148deg)';
  setTimeout(function(){
    document.getElementById('cardReveal').classList.add('show');
    burst();
  },500);
  // show tiny third box after delay, replacing the mini box
  setTimeout(function(){
    var ms=document.getElementById('miniStage');
    ms.classList.remove('show');
    ms.classList.remove('idle2');
    var ts=document.getElementById('tinyStage');
    ts.classList.add('show');
    setTimeout(function(){ ts.classList.add('idle3'); },900);
  },1900);
}

function openTinyBox(){
  if(tinyOpened)return;
  tinyOpened=true;
  var ts=document.getElementById('tinyStage');
  ts.classList.remove('idle3');
  ts.style.animation='none';
  ts.style.cursor='default';
  var tl=document.getElementById('tinyLid');
  tl.style.transition='transform 0.65s cubic-bezier(0.34,1.4,0.64,1)';
  tl.style.transform='perspective(250px) rotateX(-148deg)';
  document.getElementById('cardReveal').classList.remove('show');
  setTimeout(function(){
    document.getElementById('cardReveal2').classList.add('show');
    burst();
  },550);
}

function burst(){
  var layer=document.getElementById('cfl');
  var cols=['#e91e8c','#f06292','#ab47bc','#ffd54f','#26a69a','#1976d2','#42a5f5','#ffcc02','#66bb6a','#ff7043'];
  for(var i=0;i<70;i++){
    var d=document.createElement('div');
    d.className='cdot';
    d.style.left=(Math.random()*100)+'%';
    d.style.top='-8px';
    d.style.width=(Math.random()*7+4)+'px';
    d.style.height=(Math.random()*7+4)+'px';
    d.style.background=cols[Math.floor(Math.random()*cols.length)];
    d.style.borderRadius=Math.random()>0.5?'50%':'2px';
    d.style.animationDuration=(Math.random()*2.5+1.5)+'s';
    d.style.animationDelay=(Math.random()*1.2)+'s';
    layer.appendChild(d);
    setTimeout(function(el){return function(){el.remove()}}(d),5500);
  }
}
</script>
